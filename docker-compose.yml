version: "3.9"

services:
  backend:
    build:
      context: ./docker/apache
    container_name: php_backend
    volumes:
      - ./backend:/var/www/html
    ports:
      - "8081:80"
    depends_on:
      - db
    env_file:
      - ./backend/.env

  frontend:
    image: node:20
    container_name: vue_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5171:5171"  # host:container = same port
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5171"

  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: bpy
      MYSQL_DATABASE: opinion
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql:/docker-entrypoint-initdb.d

volumes:
  db_data: {}